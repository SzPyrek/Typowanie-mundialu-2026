<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer Mundial 2026 - Knockouts</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at 50% 0%, #1c2a43 0%, #07090e 100%); background-attachment: fixed; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: rgba(15, 23, 42, 0.7); padding: 30px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(226, 194, 117, 0.2); backdrop-filter: blur(10px); position: relative; }
        .user-badge { position: absolute; top: 20px; right: 20px; font-size: 14px; color: #E2C275; background: rgba(226, 194, 117, 0.1); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(226, 194, 117, 0.3); font-weight: bold; letter-spacing: 0.5px; }
        h1 { text-align: center; color: #E2C275; margin-bottom: 5px; font-size: 2.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; text-shadow: 0 2px 10px rgba(226, 194, 117, 0.3); }
        .subtitle { text-align: center; font-size: 1.2rem; margin-top: 0; margin-bottom: 30px; color: #a0aec0; text-transform: uppercase; letter-spacing: 4px;}
        input[type="number"], input[type="password"], select { padding: 12px; margin: 8px 0; background: rgba(0, 0, 0, 0.4); border: 1px solid #4a5568; border-radius: 8px; font-size: 18px; text-align: center; color: white; width: 100%; box-sizing: border-box; transition: all 0.3s; }
        select { appearance: none; -webkit-appearance: none; cursor: pointer; }
        select option { background: #131b2c; color: white; }
        input[type="number"]:focus, input[type="password"]:focus, select:focus { border-color: #E2C275; outline: none; box-shadow: 0 0 10px rgba(226, 194, 117, 0.2); }
        .wynik-input { width: 65px !important; font-weight: bold; font-size: 20px; display: inline-block; }
        button { background: linear-gradient(135deg, #d4af37 0%, #aa8222 100%); color: #000; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s, filter 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        button:disabled { background: #2d3748; color: #718096; cursor: not-allowed; transform: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.2); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background-color: rgba(226, 194, 117, 0.1); color: #E2C275; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-bottom: 2px solid #E2C275; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .match-card { background: linear-gradient(145deg, #131b2c 0%, #0d121d 100%); border: 1px solid rgba(226, 194, 117, 0.15); padding: 25px 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .teams { font-weight: 800; font-size: 22px; margin-bottom: 15px; color: #ffffff; letter-spacing: 1px;}
        .match-time { font-size: 12px; color: #E2C275; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .hidden { display: none; }
        .awans-sekcja { margin-top: 15px; background: rgba(226, 194, 117, 0.05); border: 1px dashed #E2C275; padding: 15px; border-radius: 8px; }
        .locked-msg { color: #fc8181; font-weight: bold; margin-top: 15px; margin-bottom: 15px; text-align: center; letter-spacing: 0.5px; }
        #loader { text-align: center; font-weight: bold; color: #E2C275; margin: 40px 0; font-size: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* NOWE STYLE DLA LISTY TYPÓW GRACZY */
        .bets-list { margin-top: 20px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; border: 1px solid rgba(226, 194, 117, 0.1); }
        .bet-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; }
        .bet-item:last-child { border-bottom: none; }
        .bet-name { font-weight: bold; color: #cbd5e0; }
        .bet-score { font-weight: bold; color: #ffffff; }
        .bet-awans { color: #a0aec0; font-size: 12px; font-weight: normal; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="user-badge" class="user-badge hidden"></div>

    <h1>KNOCKOUTS</h1>
    <div class="subtitle">Typer Mundial 2026</div>

    <div id="loader">Wczytywanie aplikacji... ⚽</div>

    <div id="login-section" class="hidden">
        <h2 style="text-align: center; color: #E2C275; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 15px;">Wybierz swój profil</h2>
        <select id="user-select"></select>
        <input type="password" id="pin-input" placeholder="Wpisz swój 4-cyfrowy PIN">
        <button onclick="zaloguj()">Rozpocznij grę</button>
    </div>

    <div id="app-section" class="hidden">
        <h2 style="color: #E2C275; border-bottom: 1px solid rgba(226,194,117,0.3); padding-bottom: 10px; text-transform: uppercase; font-size: 1.2rem;">Tabela Wyników</h2>
        <table>
            <thead>
                <tr><th>Pozycja</th><th>Gracz</th><th>Punkty</th></tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>

        <h2 style="color: #E2C275; border-bottom: 1px solid rgba(226,194,117,0.3); padding-bottom: 10px; margin-top: 40px; text-transform: uppercase; font-size: 1.2rem;">Kupony (Faza Pucharowa)</h2>
        <div id="mecze-container"></div>
    </div>
</div>

<script>
    // ==========================================
    // TUTAJ WKLEJ SWÓJ LINK DO SKRYPTU GOOGLE:
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxuOT8RzqyHnNYYWGjg417eSfbJcSg4PpHdcgj0Rj_JBBRAzIFk9DDIhMFEGCnCyClZww/exec"; 
    
    let aktualnyPin = "";
    let globalneMecze = [];

    window.onload = function() {
        pobierzDaneNaStart();
    };

    async function pobierzDaneNaStart() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            globalneMecze = data.mecze;
            
            renderujRanking(data.ranking);
            zbudujListeGraczy(data.ranking);
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        } catch (error) {
            document.getElementById('loader').innerText = "Błąd połączenia z bazą danych. Odśwież stronę.";
        }
    }

    function zbudujListeGraczy(ranking) {
        const select = document.getElementById('user-select');
        select.innerHTML = '<option value="">-- Wybierz kim jesteś --</option>';
        ranking.forEach(gracz => {
            select.innerHTML += `<option value="${gracz.imie}">${gracz.imie}</option>`;
        });
    }

    function zaloguj() {
        const wybranyGracz = document.getElementById('user-select').value;
        const pin = document.getElementById('pin-input').value;
        
        if (!wybranyGracz) return alert("Wybierz swoje imię z listy!");
        if (!pin) return alert("Wpisz swój PIN!");
        
        aktualnyPin = pin;
        
        const badge = document.getElementById('user-badge');
        badge.innerText = `👤 ${wybranyGracz}`;
        badge.classList.remove('hidden');
        
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        
        renderujMecze(globalneMecze);
    }

    function renderujRanking(ranking) {
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = "";
        ranking.forEach((gracz, index) => {
            let ikona = index === 0 ? "🏆 " : "";
            tbody.innerHTML += `<tr><td>${index + 1}</td><td>${ikona}${gracz.imie}</td><td><strong>${gracz.punkty} pkt</strong></td></tr>`;
        });
    }

    function formatujDate(dataStr) {
        if (!dataStr) return "Brak ograniczenia czasowego";
        const d = new Date(dataStr);
        return d.toLocaleDateString('pl-PL', {day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit'});
    }

    function renderujMecze(mecze) {
        const container = document.getElementById('mecze-container');
        container.innerHTML = "";
        const teraz = new Date();

        mecze.forEach(mecz => {
            if (mecz.wynikA === "" || mecz.wynikB === "") {
                
        let zablokowany = false;
        if (mecz.dataRozpoczecia) {
        const czasMeczu = new Date(mecz.dataRozpoczecia);
        // 1 * 60 * 60 * 1000 oznacza: 1 godzina * 60 minut * 60 sekund * 1000 milisekund
        const godzinaPrzedMeczem = czasMeczu - (1 * 60 * 60 * 1000); 
    
        if (teraz > godzinaPrzedMeczem) {
            zablokowany = true;
        }
        }

                let html = '';

                // Jeśli mecz się rozpoczął (zablokowany), generujemy listę typów
                if (zablokowany) {
                    let typyGraczyHTML = '<div class="bets-list">';
                    typyGraczyHTML += '<h4 style="color:#E2C275; margin-top:0; margin-bottom: 15px; text-align:center; font-size: 14px; letter-spacing: 1px;">TYPY GRACZY:</h4>';
                    
                    if (mecz.typy && mecz.typy.length > 0) {
                        mecz.typy.forEach(t => {
                            let awans = (t.typA === t.typB && t.typAwans) ? `<span class="bet-awans">(Awans: ${t.typAwans})</span>` : '';
                            typyGraczyHTML += `
                                <div class="bet-item">
                                    <span class="bet-name">👤 ${t.imie}</span>
                                    <span class="bet-score">${t.typA} : ${t.typB}${awans}</span>
                                </div>
                            `;
                        });
                    } else {
                        typyGraczyHTML += '<div style="text-align:center; font-size: 14px; color:#718096;">Nikt nie zdążył obstawić tego meczu.</div>';
                    }
                    typyGraczyHTML += '</div>';

                    html = `
                        <div class="match-card">
                            <div class="match-time">🕒 KICK-OFF: ${formatujDate(mecz.dataRozpoczecia)}</div>
                            <div class="teams">${mecz.zespolA} &nbsp;<span style="color:#E2C275; font-size:16px;">VS</span>&nbsp; ${mecz.zespolB}</div>
                            <div class="locked-msg">🔒 MECZ ROZPOCZĘTY - TYPOWANIE ZABLOKOWANE</div>
                            ${typyGraczyHTML}
                        </div>
                    `;
                } 
                // W przeciwnym razie pokazujemy standardowe pola do typowania
                else {
                    html = `
                        <div class="match-card">
                            <div class="match-time">🕒 KICK-OFF: ${formatujDate(mecz.dataRozpoczecia)}</div>
                            <div class="teams">${mecz.zespolA} &nbsp;<span style="color:#E2C275; font-size:16px;">VS</span>&nbsp; ${mecz.zespolB}</div>
                            
                            <div>
                                <input type="number" id="typA_${mecz.id}" class="wynik-input" min="0" oninput="sprawdzRemis('${mecz.id}')">
                                <span style="font-weight:bold; font-size: 20px; margin: 0 10px; color: #a0aec0;">:</span>
                                <input type="number" id="typB_${mecz.id}" class="wynik-input" min="0" oninput="sprawdzRemis('${mecz.id}')">
                            </div>
                            
                            <div id="awans_sekcja_${mecz.id}" class="awans-sekcja hidden">
                                <label style="font-weight: bold; color: #E2C275;">REMIS! Kto wygra w rzutach karnych?</label><br>
                                <select id="awans_${mecz.id}" style="margin-top: 10px;">
                                    <option value="">-- Wybierz awansującego --</option>
                                    <option value="A">${mecz.zespolA}</option>
                                    <option value="B">${mecz.zespolB}</option>
                                </select>
                            </div>
                            
                            <button onclick="wyslijTyp('${mecz.id}')" id="btn_${mecz.id}">Zatwierdź Kupon</button>
                        </div>
                    `;
                }

                container.innerHTML += html;
            }
        });

        if(container.innerHTML === "") {
            container.innerHTML = "<p style='text-align:center; color: #a0aec0; font-size: 16px;'>Wszystkie mecze rozegrane!</p>";
        }
    }

    function sprawdzRemis(idMeczu) {
        const typA = document.getElementById(`typA_${idMeczu}`).value;
        const typB = document.getElementById(`typB_${idMeczu}`).value;
        const sekcjaAwansu = document.getElementById(`awans_sekcja_${idMeczu}`);

        if (typA !== "" && typB !== "" && typA === typB) {
            sekcjaAwansu.classList.remove('hidden');
        } else {
            sekcjaAwansu.classList.add('hidden');
            document.getElementById(`awans_${idMeczu}`).value = ""; 
        }
    }

    async function wyslijTyp(idMeczu) {
        const typA = document.getElementById(`typA_${idMeczu}`).value;
        const typB = document.getElementById(`typB_${idMeczu}`).value;
        const typAwans = document.getElementById(`awans_${idMeczu}`).value;

        if (typA === "" || typB === "") return alert("Wpisz wynik dla obu drużyn!");
        if (typA === typB && typAwans === "") return alert("Przy remisie musisz wybrać drużynę, która awansuje po rzutach karnych!");

        const przycisk = document.getElementById(`btn_${idMeczu}`);
        przycisk.innerText = "Przetwarzanie...";
        przycisk.disabled = true;

        const dane = {
            pin: aktualnyPin,
            idMeczu: idMeczu,
            typA: parseInt(typA),
            typB: parseInt(typB),
            typAwans: typAwans
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(dane)
            });
            przycisk.innerText = "Kupon Zatwierdzony ✅";
            przycisk.style.background = "#27ae60"; 
            przycisk.style.color = "white";
            setTimeout(() => { 
                przycisk.innerText = "Zmień Kupon"; 
                przycisk.disabled = false; 
                przycisk.style.background = "linear-gradient(135deg, #d4af37 0%, #aa8222 100%)"; 
                przycisk.style.color = "#000";
            }, 3000);
        } catch (error) {
            alert("Błąd zapisu.");
            przycisk.innerText = "Spróbuj ponownie";
            przycisk.disabled = false;
        }
    }
</script>

</body>
</html>
