<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer Mundial 2026 - Knockouts</title>
    <style>
        /* Mroczny, stadionowy klimat z grafiką KNOCKOUTS */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1c2a43 0%, #07090e 100%);
            background-attachment: fixed;
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
        }
        
        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            background: rgba(15, 23, 42, 0.7); /* Półprzezroczysty ciemny granat */
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            border: 1px solid rgba(226, 194, 117, 0.2); /* Delikatne złote krawędzie */
            backdrop-filter: blur(10px);
        }

        /* Złote nagłówki wzorowane na "2026 FIFA WORLD CUP KNOCKOUTS" */
        h1 { 
            text-align: center; 
            color: #E2C275; 
            margin-bottom: 5px; 
            font-size: 2.8em; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(226, 194, 117, 0.3);
        }
        .subtitle { text-align: center; font-size: 1.2rem; margin-top: 0; margin-bottom: 30px; color: #a0aec0; text-transform: uppercase; letter-spacing: 4px;}
        
        input[type="number"], input[type="password"], select { 
            padding: 12px; margin: 5px 0; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #4a5568; 
            border-radius: 8px; font-size: 18px; text-align: center; 
            color: white;
            transition: all 0.3s;
        }
        input[type="number"]:focus, input[type="password"]:focus, select:focus { border-color: #E2C275; outline: none; box-shadow: 0 0 10px rgba(226, 194, 117, 0.2); }
        .wynik-input { width: 65px; font-weight: bold; font-size: 20px; }
        
        /* Główny przycisk */
        button { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8222 100%);
            color: #000; border: none; padding: 15px 20px; 
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; 
            width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s, filter 0.3s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        button:disabled { background: #2d3748; color: #718096; cursor: not-allowed; transform: none; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.2); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background-color: rgba(226, 194, 117, 0.1); color: #E2C275; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-bottom: 2px solid #E2C275; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        
        /* Karty Meczów */
        .match-card { 
            background: linear-gradient(145deg, #131b2c 0%, #0d121d 100%);
            border: 1px solid rgba(226, 194, 117, 0.15); padding: 25px 20px; 
            border-radius: 12px; margin-bottom: 20px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .teams { font-weight: 800; font-size: 22px; margin-bottom: 15px; color: #ffffff; letter-spacing: 1px;}
        .match-time { font-size: 12px; color: #E2C275; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        
        .hidden { display: none; }
        
        /* Sekcja Remisu */
        .awans-sekcja { margin-top: 15px; background: rgba(226, 194, 117, 0.05); border: 1px dashed #E2C275; padding: 15px; border-radius: 8px; }
        
        /* Blokada czasowa */
        .locked-msg { color: #fc8181; font-weight: bold; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        #loader { text-align: center; font-weight: bold; color: #E2C275; margin: 30px 0; font-size: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>KNOCKOUTS</h1>
    <div class="subtitle">Typer Mundial 2026</div>

    <div id="login-section">
        <h2 style="text-align: center; color: #E2C275; font-size: 1.2rem; text-transform: uppercase;">Logowanie gracza</h2>
        <input type="password" id="pin-input" placeholder="Wpisz 4-cyfrowy PIN" style="width: 100%; box-sizing: border-box;">
        <button onclick="zaloguj()">Rozpocznij</button>
    </div>

    <div id="app-section" class="hidden">
        <div id="loader">Wczytywanie danych z bazy...</div>
        
        <div id="content" class="hidden">
            <h2 style="color: #E2C275; border-bottom: 1px solid rgba(226,194,117,0.3); padding-bottom: 10px; text-transform: uppercase; font-size: 1.2rem;">Tabela Wyników</h2>
            <table>
                <thead>
                    <tr><th>Pozycja</th><th>Gracz</th><th>Punkty</th></tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>

            <h2 style="color: #E2C275; border-bottom: 1px solid rgba(226,194,117,0.3); padding-bottom: 10px; margin-top: 40px; text-transform: uppercase; font-size: 1.2rem;">Kupony (Faza Pucharowa)</h2>
            <div id="mecze-container"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // TUTAJ WKLEJ SWÓJ LINK DO SKRYPTU GOOGLE:
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxuOT8RzqyHnNYYWGjg417eSfbJcSg4PpHdcgj0Rj_JBBRAzIFk9DDIhMFEGCnCyClZww/exec"; 
    
    let aktualnyPin = "";

    function zaloguj() {
        const pin = document.getElementById('pin-input').value;
        if (!pin) return alert("Podaj PIN!");
        aktualnyPin = pin;
        
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        pobierzDane();
    }

    async function pobierzDane() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            ukryjLoader();
            renderujRanking(data.ranking);
            renderujMecze(data.mecze);
        } catch (error) {
            alert("Błąd pobierania danych.");
            document.getElementById('loader').innerText = "Błąd pobierania danych. Odśwież stronę.";
        }
    }

    function ukryjLoader() {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
    }

    function renderujRanking(ranking) {
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = "";
        ranking.forEach((gracz, index) => {
            let ikona = index === 0 ? "🏆 " : "";
            tbody.innerHTML += `<tr><td>${index + 1}</td><td>${ikona}${gracz.imie}</td><td><strong>${gracz.punkty} pkt</strong></td></tr>`;
        });
    }

    function formatujDate(dataStr) {
        if (!dataStr) return "Brak daty - można typować";
        const d = new Date(dataStr);
        return d.toLocaleDateString('pl-PL', {day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit'});
    }

    function renderujMecze(mecze) {
        const container = document.getElementById('mecze-container');
        container.innerHTML = "";
        const teraz = new Date();

        mecze.forEach(mecz => {
            if (mecz.wynikA === "" || mecz.wynikB === "") {
                
                // SPRAWDZANIE BLOKADY CZASOWEJ
                let zablokowany = false;
                if (mecz.dataRozpoczecia) {
                    const czasMeczu = new Date(mecz.dataRozpoczecia);
                    if (teraz > czasMeczu) {
                        zablokowany = true;
                    }
                }

                const html = `
                    <div class="match-card">
                        <div class="match-time">🕒 KICK-OFF: ${formatujDate(mecz.dataRozpoczecia)}</div>
                        <div class="teams">${mecz.zespolA} &nbsp;<span style="color:#E2C275; font-size:16px;">VS</span>&nbsp; ${mecz.zespolB}</div>
                        
                        ${zablokowany ? 
                        `
                            <div class="locked-msg">🔒 MECZ WYSTARTOWAŁ - TYPOWANIE ZAMKNIĘTE</div>
                        ` 
                        : 
                        `
                            <div>
                                <input type="number" id="typA_${mecz.id}" class="wynik-input" min="0" oninput="sprawdzRemis('${mecz.id}')">
                                <span style="font-weight:bold; font-size: 20px; margin: 0 10px; color: #a0aec0;">:</span>
                                <input type="number" id="typB_${mecz.id}" class="wynik-input" min="0" oninput="sprawdzRemis('${mecz.id}')">
                            </div>
                            
                            <div id="awans_sekcja_${mecz.id}" class="awans-sekcja hidden">
                                <label style="font-weight: bold; color: #E2C275;">REMIS! Kto wygra w rzutach karnych?</label><br>
                                <select id="awans_${mecz.id}" style="width: 100%; margin-top: 10px;">
                                    <option value="">-- Wybierz awansującego --</option>
                                    <option value="A">${mecz.zespolA}</option>
                                    <option value="B">${mecz.zespolB}</option>
                                </select>
                            </div>
                            
                            <button onclick="wyslijTyp('${mecz.id}')" id="btn_${mecz.id}">Zatwierdź Kupon</button>
                        `}
                    </div>
                `;
                container.innerHTML += html;
            }
        });

        if(container.innerHTML === "") {
            container.innerHTML = "<p style='text-align:center; color: #a0aec0; font-size: 16px;'>Wszystkie mecze rozegrane!</p>";
        }
    }

    function sprawdzRemis(idMeczu) {
        const typA = document.getElementById(`typA_${idMeczu}`).value;
        const typB = document.getElementById(`typB_${idMeczu}`).value;
        const sekcjaAwansu = document.getElementById(`awans_sekcja_${idMeczu}`);

        if (typA !== "" && typB !== "" && typA === typB) {
            sekcjaAwansu.classList.remove('hidden');
        } else {
            sekcjaAwansu.classList.add('hidden');
            document.getElementById(`awans_${idMeczu}`).value = ""; 
        }
    }

    async function wyslijTyp(idMeczu) {
        const typA = document.getElementById(`typA_${idMeczu}`).value;
        const typB = document.getElementById(`typB_${idMeczu}`).value;
        const typAwans = document.getElementById(`awans_${idMeczu}`).value;

        if (typA === "" || typB === "") {
            return alert("Wpisz wynik dla obu drużyn!");
        }
        if (typA === typB && typAwans === "") {
            return alert("Przy remisie musisz wybrać drużynę, która awansuje po rzutach karnych!");
        }

        const przycisk = document.getElementById(`btn_${idMeczu}`);
        przycisk.innerText = "Przetwarzanie...";
        przycisk.disabled = true;

        const dane = {
            pin: aktualnyPin,
            idMeczu: idMeczu,
            typA: parseInt(typA),
            typB: parseInt(typB),
            typAwans: typAwans
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(dane)
            });
            przycisk.innerText = "Kupon Zatwierdzony ✅";
            przycisk.style.background = "#27ae60"; 
            przycisk.style.color = "white";
            setTimeout(() => { 
                przycisk.innerText = "Zmień Kupon"; 
                przycisk.disabled = false; 
                przycisk.style.background = "linear-gradient(135deg, #d4af37 0%, #aa8222 100%)"; 
                przycisk.style.color = "#000";
            }, 3000);
        } catch (error) {
            alert("Błąd. Odśwież stronę i spróbuj ponownie.");
            przycisk.innerText = "Spróbuj ponownie";
            przycisk.disabled = false;
        }
    }
</script>

</body>
</html>
